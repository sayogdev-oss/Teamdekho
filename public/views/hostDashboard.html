<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TeamDekho - Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f3f4f6;
      min-height: 100vh;
    }
    header {
      background: white;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .logo h1 { font-size: 1.5rem; font-weight: 800; }
    .logo h1 span.team { color: #1a2d4e; }
    .logo h1 span.dekho { color: #00b4a6; }
    .user-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .user-info img {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: 2px solid #00b4a6;
    }
    .user-info span { font-weight: 600; color: #374151; }
    .logout-btn {
      padding: 8px 16px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      background: white;
      color: #6b7280;
      cursor: pointer;
      text-decoration: none;
      font-size: 0.9rem;
      transition: all 0.2s;
    }
    .logout-btn:hover { border-color: #dc2626; color: #dc2626; }
    .container {
      max-width: 900px;
      margin: 40px auto;
      padding: 0 24px;
    }
    .welcome {
      margin-bottom: 32px;
    }
    .welcome h2 {
      font-size: 1.8rem;
      color: #1a2d4e;
      margin-bottom: 6px;
    }
    .welcome p { color: #6b7280; }
    .room-card {
      background: white;
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      margin-bottom: 24px;
    }
    .room-card h3 {
      font-size: 1.1rem;
      color: #374151;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .room-url {
      background: #f0fffe;
      border: 2px solid #00b4a6;
      border-radius: 10px;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .room-url span {
      font-family: monospace;
      font-size: 1rem;
      color: #1a2d4e;
      font-weight: 600;
      word-break: break-all;
    }
    .copy-btn {
      padding: 8px 16px;
      background: #00b4a6;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      white-space: nowrap;
      margin-left: 12px;
      transition: background 0.2s;
    }
    .copy-btn:hover { background: #009688; }
    .action-btns {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .btn-primary {
      padding: 12px 28px;
      background: linear-gradient(135deg, #1a2d4e, #00b4a6);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .btn-primary:hover { opacity: 0.9; }
    .btn-secondary {
      padding: 12px 24px;
      background: white;
      color: #1a2d4e;
      border: 2px solid #1a2d4e;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-secondary:hover { background: #1a2d4e; color: white; }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .stat-card .number {
      font-size: 2rem;
      font-weight: 800;
      color: #00b4a6;
    }
    .stat-card .label {
      font-size: 0.85rem;
      color: #6b7280;
      margin-top: 4px;
    }
    .loading { text-align: center; padding: 40px; color: #6b7280; }
  </style>
</head>
<body>
  <header>
    <div class="logo">
      <a href="/" style="text-decoration: none;">
        <h1><span class="team">Team</span><span class="dekho">Dekho</span></h1>
      </a>
    </div>
    <div style="display: flex; align-items: center; gap: 20px;">
      <a href="/pricing" style="color: #6b7280; text-decoration: none; font-weight: 600; font-size: 0.95rem; transition: color 0.2s;">Pricing</a>
      <div class="user-info">
        <img id="userAvatar" src="" alt="Avatar" onerror="this.style.display='none'"/>
        <span id="userName">Loading...</span>
        <a href="/auth/logout" class="logout-btn">Logout</a>
      </div>
    </div>
  </header>

  <div class="container">
    <div class="welcome">
      <h2 id="welcomeText">Welcome back!</h2>
      <p>Manage your meetings from your dashboard</p>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="number" id="totalMeetings">0</div>
        <div class="label">Total Meetings</div>
      </div>
      <div class="stat-card">
        <div class="number">∞</div>
        <div class="label">Free Meetings Left</div>
      </div>
      <div class="stat-card">
        <div class="number">1000</div>
        <div class="label">Max Participants</div>
      </div>
    </div>

    <div class="room-card">
      <h3>🔗 Your Permanent Meeting Room</h3>
      <div class="room-url">
        <span id="roomUrl">Loading...</span>
        <button class="copy-btn" onclick="copyUrl()">Copy Link</button>
      </div>
      <div class="action-btns">
        <a id="startMeetingBtn" href="#" class="btn-primary">🎥 Start Meeting</a>
        <button class="btn-secondary" onclick="copyUrl()">📋 Copy Invite Link</button>
      </div>
    </div>
  </div>

  <script>
    let userData = null;

    async function loadDashboard() {
      try {
        const res = await fetch('/api/host/me');
        if (!res.ok) {
          window.location.href = '/host/login';
          return;
        }
        const data = await res.json();
        userData = data.user;

        document.getElementById('userName').textContent = userData.name;
        document.getElementById('welcomeText').textContent = `Welcome back, ${userData.name.split(' ')[0]}!`;

        if (userData.avatar) {
          document.getElementById('userAvatar').src = userData.avatar;
        }

        const roomUrl = `${window.location.origin}/join/${userData.room_slug}`;
        document.getElementById('roomUrl').textContent = roomUrl;
        document.getElementById('startMeetingBtn').href = `/${userData.room_slug}`;

      } catch (err) {
        console.error('Dashboard error:', err);
        window.location.href = '/host/login';
      }
    }

    function copyUrl() {
      const url = document.getElementById('roomUrl').textContent;
      navigator.clipboard.writeText(url).then(() => {
        const btn = document.querySelector('.copy-btn');
        btn.textContent = '✓ Copied!';
        btn.style.background = '#059669';
        setTimeout(() => {
          btn.textContent = 'Copy Link';
          btn.style.background = '#00b4a6';
        }, 2000);
      });
    }

    loadDashboard();
  </script>
</body>
</html>
