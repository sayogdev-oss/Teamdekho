<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TeamDekho - Enter Meeting Passcode</title>
  <style>
    :root {
      --primary: #1a2d4e;
      --secondary: #00b4a6;
      --secondary-hover: #00968b;
      --bg-main: #0f1923;
      --card-bg: #1a2535;
      --text-muted: #94a3b8;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg-main);
      color: #f8fafc;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 2.5rem;
      width: 100%;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }

    .logo {
      font-size: 2rem;
      font-weight: 800;
      margin-bottom: 1.5rem;
      text-decoration: none;
      display: inline-block;
      color: #ffffff;
    }

    .logo span.dekho {
      color: var(--secondary);
    }

    .meeting-topic {
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: #ffffff;
    }

    .subtitle {
      font-size: 0.9rem;
      color: var(--text-muted);
      margin-bottom: 2rem;
    }

    .form-group {
      margin-bottom: 1.5rem;
      text-align: left;
    }

    .form-group label {
      display: block;
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
      font-weight: 600;
    }

    .form-control {
      width: 100%;
      padding: 0.8rem 1rem;
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      color: #ffffff;
      font-size: 1rem;
      text-align: center;
      letter-spacing: 0.1em;
      transition: all 0.2s;
    }

    .form-control:focus {
      outline: none;
      border-color: var(--secondary);
      box-shadow: 0 0 0 2px rgba(0, 180, 166, 0.2);
    }

    .btn-join {
      width: 100%;
      background: var(--secondary);
      color: var(--bg-main);
      border: none;
      padding: 0.9rem;
      border-radius: 8px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
      margin-bottom: 1.5rem;
    }

    .btn-join:hover {
      background: var(--secondary-hover);
    }

    .cancel-link {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 600;
      transition: color 0.2s;
    }

    .cancel-link:hover {
      color: #ffffff;
    }

    .error-msg {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid #ef4444;
      color: #fca5a5;
      padding: 0.8rem;
      border-radius: 6px;
      font-size: 0.85rem;
      margin-bottom: 1.5rem;
      display: none;
    }

    .loading-state {
      padding: 2rem 0;
    }

    .spinner {
      border: 4px solid rgba(255, 255, 255, 0.1);
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border-left-color: var(--secondary);
      animation: spin 1s linear infinite;
      margin: 0 auto 1rem;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <div class="card">
    <a href="/" class="logo">
      <span>Team</span><span class="dekho">Dekho</span>
    </a>

    <!-- Loading State -->
    <div id="loading" class="loading-state">
      <div class="spinner"></div>
      <p>Retrieving meeting details...</p>
    </div>

    <!-- Join Content (Hidden initially) -->
    <div id="join-content" style="display: none;">
      <h3 class="meeting-topic" id="meeting-topic-title">Meeting Topic</h3>
      <p class="subtitle">This meeting requires a passcode</p>

      <div class="error-msg" id="error-message">
        Incorrect passcode. Please try again.
      </div>

      <form id="passcode-form">
        <div class="form-group">
          <label for="passcode">Passcode</label>
          <input type="password" id="passcode" class="form-control" placeholder="Enter Passcode" required>
        </div>
        <button type="submit" class="btn-join">Join Meeting</button>
      </form>

      <a href="/" class="cancel-link">Cancel</a>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const pathParts = window.location.pathname.split('/');
      const meetingId = pathParts[pathParts.length - 1];

      const loadingDiv = document.getElementById('loading');
      const joinContentDiv = document.getElementById('join-content');
      const meetingTopicTitle = document.getElementById('meeting-topic-title');
      const passcodeForm = document.getElementById('passcode-form');
      const passcodeInput = document.getElementById('passcode');
      const errorMessage = document.getElementById('error-message');

      let fetchedMeeting = null;

      // Get passcode from URL query params if present initially
      const urlParams = new URLSearchParams(window.location.search);
      const urlPwd = urlParams.get('pwd') || '';

      // Fetch meeting info
      fetch(`/api/meetings/info/${meetingId}`)
        .then(res => {
          if (!res.ok) throw new Error('Meeting not found');
          return res.json();
        })
        .then(data => {
          fetchedMeeting = data;
          meetingTopicTitle.textContent = data.topic;
          
          // If meeting doesn't require passcode, redirect directly
          if (!data.hasPasscode) {
            window.location.href = `/join/${data.roomSlug}`;
            return;
          }

          // If meeting has passcode, and pwd is provided in url query params, verify it
          if (urlPwd) {
            verifyAndJoin(urlPwd);
          } else {
            loadingDiv.style.display = 'none';
            joinContentDiv.style.display = 'block';
            passcodeInput.focus();
          }
        })
        .catch(err => {
          console.error('[Passcode Page] Error:', err);
          loadingDiv.innerHTML = `
            <p style="color: #ef4444; font-weight: bold; margin-bottom: 1.5rem;">Meeting Not Found</p>
            <p style="margin-bottom: 1.5rem; font-size: 0.9rem; color: var(--text-muted);">The meeting ID may be invalid or expired.</p>
            <a href="/" class="cancel-link" style="color: var(--secondary);">Back to Home</a>
          `;
        });

      // Submit form
      passcodeForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const pwd = passcodeInput.value.trim();
        if (!pwd) return;
        verifyAndJoin(pwd);
      });

      function verifyAndJoin(pwd) {
        errorMessage.style.display = 'none';
        
        // We will make a call to check if pwd is correct. In this simple architecture, we verify client-side
        // by making a quick api request or by matching it. Wait, we returned hasPasscode from backend, not the actual passcode itself
        // so to keep it highly secure, we can post/verify or verify with a secure callback or we can check via api.
        // Wait, since we are doing standard passcode checking, let's post it to a simple verification api or query it.
        // Wait! Let's check how passcode should be verified:
        // "On submit: verify passcode matches. If correct: redirect to actual room. If wrong: show 'Incorrect passcode. Please try again.'"
        // Let's create an endpoint in Server.js to verify the passcode, or we can fetch the passcode securely.
        // Actually, let's add a `/api/meetings/verify` POST route to verify the passcode! That's extremely secure and professional!
        
        fetch('/api/meetings/verify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ meetingId: fetchedMeeting.meetingId || fetchedMeeting.roomSlug, passcode: pwd })
        })
        .then(res => res.json())
        .then(data => {
          if (data.success) {
            window.location.href = `/join/${fetchedMeeting.roomSlug}?pwd=${encodeURIComponent(pwd)}`;
          } else {
            errorMessage.textContent = data.error || 'Incorrect passcode. Please try again.';
            errorMessage.style.display = 'block';
            passcodeInput.value = '';
            passcodeInput.focus();
            loadingDiv.style.display = 'none';
            joinContentDiv.style.display = 'block';
          }
        })
        .catch(err => {
          console.error('[Passcode Page] Verify failed:', err);
          errorMessage.textContent = 'Verification error. Please try again.';
          errorMessage.style.display = 'block';
          loadingDiv.style.display = 'none';
          joinContentDiv.style.display = 'block';
        });
      }
    });
  </script>
</body>
</html>
