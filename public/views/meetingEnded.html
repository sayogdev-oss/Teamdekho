<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TeamDekho - Meeting Ended</title>
  <link rel="icon" href="../images/logo.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1923;
      color: #f8fafc;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .top-logo {
      position: fixed;
      top: 0; left: 0; right: 0;
      background: rgba(15,25,35,0.95);
      border-bottom: 1px solid rgba(255,255,255,0.07);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      backdrop-filter: blur(10px);
      z-index: 100;
    }
    .top-logo img {
      height: 40px;
      width: 40px;
      border-radius: 10px;
      object-fit: cover;
      flex-shrink: 0;
    }
    .top-logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.1;
    }
    .top-logo-text .name {
      font-size: 1.05rem;
      font-weight: 800;
      letter-spacing: -0.3px;
      color: #f8fafc;
    }
    .top-logo-text .name .dekho { color: rgb(0,180,166); }
    .top-logo-text .tagline {
      font-size: 0.65rem;
      color: #64748b;
      letter-spacing: 0.3px;
      text-transform: uppercase;
    }
    .main-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 460px;
      margin-top: 60px;
    }
    .brand-logo {
      margin-bottom: 2rem;
      text-align: center;
    }
    .brand-logo img {
      height: 56px;
      width: auto;
      border-radius: 12px;
    }
    .card {
      background: #1a2535;
      border: 1px solid rgba(0,180,166,0.15);
      border-radius: 20px;
      padding: 2.5rem 2rem;
      text-align: center;
      width: 100%;
      box-shadow: 0 24px 48px rgba(0,0,0,0.3);
    }
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(0,180,166,0.1);
      border: 1px solid rgba(0,180,166,0.25);
      color: rgb(0,180,166);
      font-size: 0.78rem;
      font-weight: 700;
      padding: 5px 14px;
      border-radius: 20px;
      margin-bottom: 1.5rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .status-dot {
      width: 7px; height: 7px;
      background: rgb(0,180,166);
      border-radius: 50%;
    }
    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 0.6rem;
      letter-spacing: -0.3px;
    }
    p {
      color: #94a3b8;
      font-size: 0.92rem;
      margin-bottom: 1.75rem;
      line-height: 1.65;
    }
    .meeting-info {
      background: rgba(0,0,0,0.25);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 10px;
      padding: 10px 16px;
      margin-bottom: 1.75rem;
      font-size: 0.83rem;
      color: #64748b;
      display: none;
    }
    .meeting-info strong { color: #94a3b8; }
    .duration-row {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin-bottom: 1.75rem;
    }
    .duration-item {
      text-align: center;
    }
    .duration-value {
      font-size: 1.4rem;
      font-weight: 700;
      color: #f8fafc;
    }
    .duration-label {
      font-size: 0.72rem;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .divider {
      height: 1px;
      background: rgba(255,255,255,0.06);
      margin: 1.5rem 0;
    }
    .btn-primary {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      background: rgb(0,180,166);
      color: #0f1923;
      border: none;
      border-radius: 10px;
      padding: 13px 24px;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      margin-bottom: 10px;
      text-decoration: none;
      transition: background 0.2s, transform 0.1s;
    }
    .btn-primary:hover { background: rgb(0,160,148); transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }
    .btn-secondary {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      background: rgba(255,255,255,0.05);
      color: #cbd5e1;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 13px 24px;
      font-weight: 600;
      font-size: 0.92rem;
      cursor: pointer;
      margin-bottom: 10px;
      text-decoration: none;
      transition: background 0.2s, border-color 0.2s;
    }
    .btn-secondary:hover {
      background: rgba(255,255,255,0.09);
      border-color: rgba(255,255,255,0.2);
      color: #f8fafc;
    }
    .footer-text {
      margin-top: 1.5rem;
      font-size: 0.78rem;
      color: #475569;
      text-align: center;
    }
    @media (max-width: 480px) {
      body { padding: 1rem; }
      .card { padding: 2rem 1.25rem; border-radius: 16px; }
      h1 { font-size: 1.35rem; }
      .main-wrap { margin-top: 70px; }
    }
  </style>
</head>
<body>

  <div class="top-logo">
    <img src="../images/logo.png" alt="TeamDekho" onerror="this.style.display='none'">
    <div class="top-logo-text">
      <span class="name">Team<span class="dekho">Dekho</span></span>
      <span class="tagline">HD Video Meetings</span>
    </div>
  </div>

  <div class="main-wrap">

    <div class="card">
      <div class="status-badge">
        <div class="status-dot"></div>
        <span id="badge-text">Session Ended</span>
      </div>

      <h1 id="page-title">You have left the meeting</h1>
      <p id="page-desc">Your meeting session has ended. We hope it was productive!</p>

      <div class="meeting-info" id="meeting-info">
        Room: <strong id="room-name">—</strong>
      </div>

      <div class="duration-row" id="duration-row" style="display:none;">
        <div class="duration-item">
          <div class="duration-value" id="dur-min">—</div>
          <div class="duration-label">Minutes</div>
        </div>
        <div class="duration-item">
          <div class="duration-value" id="dur-sec">—</div>
          <div class="duration-label">Seconds</div>
        </div>
      </div>

      <div class="divider"></div>

      <a href="/free/dashboard" class="btn-primary" id="btn-dashboard">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Back to Dashboard
      </a>

      <a href="/" id="btn-rejoin" class="btn-secondary" style="display:none;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17 10.5V7a1 1 0 00-1-1H4a1 1 0 00-1 1v10a1 1 0 001 1h12a1 1 0 001-1v-3.5l4 4v-11l-4 4z"/></svg>
        Rejoin Meeting
      </a>

      <a href="/" class="btn-secondary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7"/><path d="M9 22V12h6v10"/></svg>
        Go to Home
      </a>

      <div class="footer-text">TeamDekho — Secure HD Video Meetings</div>
    </div>

  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const room = params.get('room');
    const type = params.get('type');
    const startTime = parseInt(params.get('start') || '0');

    if (type === 'ended') {
      document.getElementById('badge-text').textContent = 'Meeting Ended by Host';
      document.getElementById('page-title').textContent = 'Meeting Ended';
      document.getElementById('page-desc').textContent =
        'This meeting has been ended by the host. Thank you for joining on TeamDekho.';
    }

    if (room) {
      document.getElementById('meeting-info').style.display = 'block';
      document.getElementById('room-name').textContent = room;
      document.getElementById('btn-rejoin').style.display = 'flex';
      document.getElementById('btn-rejoin').href =
        '/join/?room=' + encodeURIComponent(room);
    }

    if (startTime > 0) {
      const elapsed = Math.floor((Date.now() - startTime) / 1000);
      const mins = Math.floor(elapsed / 60);
      const secs = elapsed % 60;
      document.getElementById('dur-min').textContent = String(mins).padStart(2,'0');
      document.getElementById('dur-sec').textContent = String(secs).padStart(2,'0');
      document.getElementById('duration-row').style.display = 'flex';
    }

    fetch('/api/host/me').then(r => {
      if (!r.ok) document.getElementById('btn-dashboard').style.display = 'none';
    }).catch(() => {
      document.getElementById('btn-dashboard').style.display = 'none';
    });
  </script>
</body>
</html>
